name: CI Pipeline

env:
  IMAGE_NAME: gotogheter
  TZ: UTC

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'modules/**'
  workflow_dispatch:

jobs:
  static-analysis:
    name: Static Analysis (Detekt)
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3.5.0

#      - name: Run Detekt
#        uses: gradle/gradle-build-action@v3
#        with:
#          arguments: detekt
#
#      - name: Run application tests & Coverage
#        run: ./gradlew test koverVerify koverHtmlReport
#
#      # Upload do relatório para você ver o que não foi coberto em caso de falha
#      - name: Upload Kover Report
#        if: always() # Garante que o relatório suba mesmo se o teste ou a cobertura falharem
#        uses: actions/upload-artifact@v4
#        with:
#          name: kover-report
#          path: build/reports/kover/html
  tests:
    name: Tests runner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Run application tests
        run: ./gradlew test
